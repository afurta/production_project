name: Linting, testing, building
on:  
  push:
  pull_request:
    branches:
      - master
jobs:
  lint-format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
      node: [12]
    steps:
      - name: Checkout Commit
      uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node }}